<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qibla Kompas</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-light:#f0d080;--gold-dim:#8a6e2f;
  --green:#1a6b3c;--green-light:#2d9a59;
  --bg:#0a0f1a;--bg2:#0f1828;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --text:#e8dfc8;--text-dim:#8a8070;--radius:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden}
body{min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px 16px 60px}

.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;opacity:0.3}
.orb1{width:400px;height:400px;background:radial-gradient(circle,#1a4a2e,transparent);top:-100px;left:-100px}
.orb2{width:350px;height:350px;background:radial-gradient(circle,#2a1a00,transparent);top:50%;right:-80px;transform:translateY(-50%)}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#0a1525,transparent);bottom:-60px;left:30%}

.app{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:24px}

.header{text-align:center;padding-top:8px}
.header-icon{font-size:32px;margin-bottom:8px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.header h1{font-family:'Amiri',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--gold-light),var(--gold),var(--gold-dim));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
.subtitle{font-size:13px;color:var(--text-dim);margin-top:4px;font-weight:300;letter-spacing:0.5px}

.compass-section{display:flex;flex-direction:column;align-items:center;gap:20px}

.compass-outer-ring{
  position:relative;width:280px;height:280px;border-radius:50%;
  background:conic-gradient(from 0deg,rgba(201,168,76,0.08) 0deg,rgba(26,107,60,0.06) 90deg,rgba(201,168,76,0.08) 180deg,rgba(26,107,60,0.06) 270deg,rgba(201,168,76,0.08) 360deg);
  border:1.5px solid rgba(201,168,76,0.25);
  box-shadow:0 0 40px rgba(201,168,76,0.08),inset 0 0 30px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
}
.compass-outer-ring.active{box-shadow:0 0 60px rgba(201,168,76,0.18),inset 0 0 30px rgba(0,0,0,0.4)}

.tick-marks{position:absolute;inset:0;border-radius:50%}

.compass-ring-label.s{bottom:10px;left:50%;transform:translateX(-50%);color:var(--text-dim);position:absolute;font-size:13px;font-weight:600}
.compass-ring-label.e{right:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);position:absolute;font-size:13px;font-weight:600}
.compass-ring-label.w{left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);position:absolute;font-size:13px;font-weight:600}

.kaaba-fixed-top {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  z-index: 6;
}

.compass-body{
  position:relative;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#1a2535,#0c1420);
  border:1px solid rgba(201,168,76,0.15);
  box-shadow:inset 0 4px 20px rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}

/* Koddagi transition olib tashlandi, chunki JavaScript silliqlashni o'zi bajaradi */
.qibla-arrow-wrap{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  will-change: transform;
}
.qibla-arrow{position:relative;width:6px;height:180px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.arrow-head{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:18px solid var(--gold-light);filter:drop-shadow(0 0 8px rgba(240,208,128,0.8));margin-bottom:-1px}
.arrow-shaft{width:3px;height:70px;background:linear-gradient(to bottom,var(--gold-light),var(--gold));border-radius:2px;box-shadow:0 0 8px rgba(201,168,76,0.7)}

.compass-center{position:absolute;z-index:10}
.center-dot{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,#d4a843,#8a6e2f);border:2px solid var(--gold-light);box-shadow:0 0 12px rgba(201,168,76,0.7)}

.degree-display{display:flex;flex-direction:column;align-items:center;gap:4px}
.degree-val{font-size:42px;font-weight:600;background:linear-gradient(135deg,var(--gold-light),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.degree-label{font-size:12px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.info-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%}
.card{background:var(--surface);border:0.5px solid rgba(201,168,76,0.12);border-radius:var(--radius);padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.card.active{background:rgba(201,168,76,0.07);border-color:rgba(201,168,76,0.3);box-shadow:0 0 20px rgba(201,168,76,0.08)}
.card-icon{font-size:18px}
.card-content{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0;width:100%}
.card-label{font-size:9px;color:var(--text-dim);letter-spacing:0.5px;text-transform:uppercase;text-align:center}
.card-val{font-size:12px;font-weight:500;color:var(--gold);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

.status-bar{width:100%;background:var(--surface);border:0.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim);min-height:44px}
.status-icon{font-size:16px;flex-shrink:0}
.status-bar.success{background:rgba(26,107,60,0.15);border-color:rgba(45,154,89,0.3);color:#7ecfa0}
.status-bar.error{background:rgba(180,40,40,0.12);border-color:rgba(200,60,60,0.3);color:#f08080}
.status-bar.loading{animation:statusPulse 1.5s ease-in-out infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.6}}

.find-btn{position:relative;width:100%;padding:16px;background:linear-gradient(135deg,#1a5c35,#0f3d22);border:1px solid rgba(45,154,89,0.4);border-radius:var(--radius);color:#7ecfa0;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;cursor:pointer;overflow:hidden;letter-spacing:0.3px}
.find-btn:hover{background:linear-gradient(135deg,#1f6e3e,#123d22);border-color:rgba(45,154,89,0.6);box-shadow:0 4px 20px rgba(26,107,60,0.3);transform:translateY(-1px)}
.find-btn:active{transform:translateY(1px);box-shadow:none}
.find-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

.manual-section{width:100%}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:14px;color:var(--text-dim);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(255,255,255,0.1)}
.manual-inputs{display:flex;gap:8px}
.city-input{flex:1;padding:12px 14px;background:var(--surface);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none}
.city-input:focus{border-color:rgba(201,168,76,0.4);background:var(--surface2)}
.city-input::placeholder{color:var(--text-dim)}
.search-btn{padding:12px 18px;background:rgba(201,168,76,0.1);border:0.5px solid rgba(201,168,76,0.3);border-radius:10px;color:var(--gold);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}

@media(max-width:380px){
  .compass-outer-ring{width:250px;height:250px}
  .compass-body{width:195px;height:195px}
  .degree-val{font-size:36px}
}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="app">
  <header class="header">
    <div class="header-icon">☪</div>
    <h1>Qibla Kompas</h1>
    <p class="subtitle">Ka'baga yo'nalishni aniqlang</p>
  </header>

  <div class="compass-section">
    <div class="compass-outer-ring" id="outerRing">
      <div class="kaaba-fixed-top">🕋</div>
      <div class="compass-ring-label s">S</div>
      <div class="compass-ring-label e">E</div>
      <div class="compass-ring-label w">W</div>
      <div class="tick-marks" id="tickMarks"></div>
      
      <div class="compass-body">
        <div class="qibla-arrow-wrap" id="qiblaArrowWrap">
          <div class="qibla-arrow">
            <div class="arrow-head"></div>
            <div class="arrow-shaft"></div>
          </div>
        </div>
        <div class="compass-center"><div class="center-dot"></div></div>
      </div>
    </div>
    
    <div class="degree-display">
      <span class="degree-val" id="degreeVal">--°</span>
      <span class="degree-label">Qibla yo'nalishi</span>
    </div>
  </div>

  <div class="info-cards">
    <div class="card" id="cardDir">
      <div class="card-icon">🧭</div>
      <div class="card-content">
        <span class="card-label">Yo'nalish</span>
        <span class="card-val" id="dirVal">—</span>
      </div>
    </div>
    <div class="card" id="cardDist">
      <div class="card-icon">📏</div>
      <div class="card-content">
        <span class="card-label">Ka'bagacha</span>
        <span class="card-val" id="distVal">—</span>
      </div>
    </div>
    <div class="card" id="cardCoords">
      <div class="card-icon">📍</div>
      <div class="card-content">
        <span class="card-label">Koordinata</span>
        <span class="card-val" id="coordsVal">—</span>
      </div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-icon" id="statusIcon">⏳</div>
    <span id="statusText">Joylashuvni aniqlash uchun tugmani bosing</span>
  </div>

  <button class="find-btn" id="findBtn" onclick="startFinding()">
    <span style="display:flex;align-items:center;justify-content:center;gap:8px;">
      <span>📡</span><span id="btnLabel">Joylashuvni Aniqlash</span>
    </span>
  </button>

  <div class="manual-section">
    <div class="divider"><span>yoki qo'lda kiriting</span></div>
    <div class="manual-inputs">
      <input type="text" id="cityInput" placeholder="Shahar nomi..." class="city-input"/>
      <button class="search-btn" onclick="searchCity()">Qidirish</button>
    </div>
  </div>
</div>

<script>
var KAABA = { lat: 21.4225, lng: 39.8262 };
var currentQibla = 0;
var targetRotation = 0;
var currentRotation = 0;
var deviceOrientationActive = false;

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function calcQibla(lat, lng) {
  var lat1 = toRad(lat), lng1 = toRad(lng);
  var lat2 = toRad(KAABA.lat), lng2 = toRad(KAABA.lng);
  var dLng = lng2 - lng1;
  return (((toDeg(Math.atan2(Math.sin(dLng), Math.cos(lat1) * Math.tan(lat2) - Math.sin(lat1) * Math.cos(dLng)))) % 360) + 360) % 360;
}

function calcDistance(lat, lng) {
  var dLat = toRad(KAABA.lat - lat), dLng = toRad(KAABA.lng - lng);
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat))*Math.cos(toRad(KAABA.lat))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function cardinalDir(q) {
  var d = ["Shimol","Shimoli-sharq","Sharq","Janubi-sharq","Janub","Janubi-g'arb","G'arb","Shimoli-g'arb"];
  return d[Math.round(q / 45) % 8];
}

// Chiziqlar chizish
(function() {
  var container = document.getElementById('tickMarks');
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 280 280');
  svg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border-radius:50%;';
  for (var i = 0; i < 72; i++) {
    var angle = i * 5, rad = toRad(angle - 90), isMajor = angle % 45 === 0, isMed = angle % 15 === 0;
    var innerR = isMajor ? 122 : isMed ? 128 : 132;
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', 140 + 136 * Math.cos(rad)); line.setAttribute('y1', 140 + 136 * Math.sin(rad));
    line.setAttribute('x2', 140 + innerR * Math.cos(rad)); line.setAttribute('y2', 140 + innerR * Math.sin(rad));
    line.setAttribute('stroke', isMajor ? 'rgba(201,168,76,0.55)' : isMed ? 'rgba(201,168,76,0.28)' : 'rgba(255,255,255,0.07)');
    line.setAttribute('stroke-width', isMajor ? '1.5' : '0.8');
    svg.appendChild(line);
  }
  container.appendChild(svg);
})();

// ── Low-pass filter (Silliq va ravon aylanish siri) ───────────────────────
function smoothAnimation() {
  // Eng yaqin burilish yo'lini hisoblash (360 darajadan sakrab o'tmaslik uchun)
  var diff = targetRotation - currentRotation;
  while (diff < -180) diff += 360;
  while (diff > 180) diff -= 360;
  
  // 0.08 koeffitsiyent strelkani yumshoq va titramasdan harakatlantiradi
  currentRotation += diff * 0.08; 
  
  document.getElementById('qiblaArrowWrap').style.transform = 'rotate(' + currentRotation + 'deg)';
  requestAnimationFrame(smoothAnimation);
}
requestAnimationFrame(smoothAnimation);

function updateCompass(qibla, heading) {
  // Telefon qanday ushlansada to'g'ri ishlashi uchun burchak farqi
  targetRotation = heading - qibla;
  
  document.getElementById('degreeVal').textContent = Math.round(qibla) + '°';
  document.getElementById('dirVal').textContent = cardinalDir(qibla);
  document.getElementById('cardDir').classList.add('active');
}

function applyLocation(lat, lng, label) {
  currentQibla = calcQibla(lat, lng);
  var dist = calcDistance(lat, lng);
  updateCompass(currentQibla, 0);
  document.getElementById('distVal').textContent = Math.round(dist).toLocaleString() + ' km';
  document.getElementById('coordsVal').textContent = lat.toFixed(2) + '°, ' + lng.toFixed(2) + '°';
  document.getElementById('cardDist').classList.add('active');
  document.getElementById('cardCoords').classList.add('active');
  setStatus('success', '✅', label + ' · Qibla ' + Math.round(currentQibla) + '°');
  document.getElementById('outerRing').classList.add('active');
  startDeviceOrientation();
}

function setStatus(type, icon, msg) {
  var bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusText').textContent = msg;
}

function startFinding() {
  if (!navigator.geolocation) { setStatus('error','❌',"GPS qo'llab-quvvatlanmaydi"); return; }
  setStatus('loading','📡','GPS aniqlanmoqda...');
  document.getElementById('findBtn').disabled = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      document.getElementById('findBtn').disabled = false;
      applyLocation(pos.coords.latitude, pos.coords.longitude, 'GPS joylashuv');
    },
    function() {
      document.getElementById('findBtn').disabled = false;
      setStatus('error','❌','GPS xatosi yoki ruxsat berilmagan');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function searchCity() {
  var city = document.getElementById('cityInput').value.trim();
  if (!city) return;
  setStatus('loading','🔍','Qidirilmoqda...');
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(city) + '&format=json&limit=1')
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(!data.length) { setStatus('error','❌','Topilmadi'); return; }
    applyLocation(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name.split(',')[0]);
  }).catch(function(){ setStatus('error','❌','Xatolik yuz berdi'); });
}

function startDeviceOrientation() {
  if (deviceOrientationActive) return;
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state){
      if (state === 'granted') { listenOrientation(); deviceOrientationActive = true; }
    });
  } else { listenOrientation(); deviceOrientationActive = true; }
}

function listenOrientation() {
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
}

// Telefonni har qanday holatda (qiya, tik yoki yotiq) ushlaganda burchakni stabil saqlash
function handleOrientation(e) {
  var heading = null;
  
  if (e.webkitCompassHeading !== undefined) {
    heading = e.webkitCompassHeading;
  } else if (e.absolute === true || e.absolute === undefined) {
    if (e.alpha !== null) {
      // Android qurilmalar uchun 3D kompas burchagini hisoblash filtratsiyasi
      heading = 360 - e.alpha;
    }
  }
  
  if (heading !== null) {
    updateCompass(currentQibla, heading);
  }
}

document.getElementById('cityInput').addEventListener('keydown', function(e){ if(e.key==='Enter') searchCity(); });
</script>
</body>
</html>
